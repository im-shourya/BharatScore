# ============================================================================
# BharatScore / CredSaathi — Prometheus Alert Rules
# Section 24 of the database specification
# ============================================================================

groups:
  - name: database
    rules:
      - alert: PostgresConnectionsHigh
        expr: pg_stat_activity_count > 250
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "PostgreSQL connection count high ({{ $value }})"

      - alert: PostgresReplicationLag
        expr: pg_replication_slots_confirmed_flush_lsn_diff_bytes > 10485760
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Replication lag > 10MB"

      - alert: PostgresDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0
        for: 1m
        labels: { severity: warning }
        annotations:
          summary: "Deadlocks detected in PostgreSQL"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Redis memory usage > 90%"

      - alert: RedisConnectionsHigh
        expr: redis_connected_clients > 450
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Redis connected clients high ({{ $value }})"

      - alert: KafkaConsumerLagHigh
        expr: kafka_consumer_group_lag > 5000
        for: 10m
        labels: { severity: warning }
        annotations:
          summary: "Kafka consumer lag high on {{ $labels.topic }}"

      - alert: KafkaProducerErrors
        expr: rate(kafka_producer_errors_total[5m]) > 0.5
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "Kafka producer error rate elevated"

      - alert: S3UploadErrors
        expr: rate(s3_upload_errors_total[5m]) > 0.1
        for: 2m
        labels: { severity: critical }
        annotations:
          summary: "S3 upload error rate elevated"

      - alert: MongoDBConnectionPoolExhausted
        expr: mongodb_connection_pool_available == 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "MongoDB connection pool exhausted"

      - alert: ModelPSIAlert
        expr: clickhouse_psi_value > 0.2
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: "Feature drift detected — PSI {{ $value }} for {{ $labels.feature }}"

      - alert: HighLatencyScoring
        expr: histogram_quantile(0.95, rate(scoring_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "P95 scoring latency exceeds 3 seconds"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: "HTTP 5xx error rate > 5%"
